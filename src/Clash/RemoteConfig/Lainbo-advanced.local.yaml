    proxies:
      - 🇪🇺 欧洲自动
      - 🇺🇸 美国自动
      - 🇸🇬 狮城自动
      - ✈️ 节点选择
      - 🇭🇰 香港自动
      - 🇹🇼 台湾自动
      - 🇯🇵 日本自动

  - name: 📲 TelegramDC5
    type: select
    proxies:
      - 🇸🇬 狮城自动
      - 🇺🇸 美国自动
      - 🇪🇺 欧洲自动
      - ✈️ 节点选择
      - 🇭🇰 香港自动
      - 🇹🇼 台湾自动
      - 🇯🇵 日本自动

  - name: 📲 Telegram
    type: select
    proxies:
      - 🇸🇬 狮城自动
      - 🇺🇸 美国自动
      - 🇪🇺 欧洲自动
      - ✈️ 节点选择
      - 🇭🇰 香港自动
      - 🇹🇼 台湾自动
      - 🇯🇵 日本自动
      - DIRECT
    use:
      - Subscription1
      # - Subscription2

  - name: 🔗 无需代理
    type: select
    proxies:
      - DIRECT
      - ✈️ 节点选择

  - name: 🛡️ 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT
      - ✈️ 节点选择

  - name: 💠 容错规则
