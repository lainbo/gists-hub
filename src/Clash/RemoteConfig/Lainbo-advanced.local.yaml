mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.market.xiaomi.com"
  default-nameserver:
    - 180.184.1.1
    - 223.5.5.5
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxy-providers:
  # 这里是第一个订阅，「Subscription1」是起的名字，你完全可以叫 AAA、BBB，但是相当于 id，后面还要用
  # 可以搜索本文件中的 Subscription1 ，要改名字的话全都要改
  Subscription1:
    type: http
    url: "你的订阅地址写在这里， 订阅地址的 url 打开，必须得是纯 base64 字符串的那种"
    path: ./providers/Subscription1.yaml
    interval: 86400
    exclude-filter: "(?i)(?:\\d+(\\.\\d*)?\\s*GB|traffic|expire|premium|github|isp|流量|网址|套餐|应急|时间|重置|剩余|[到过]期|订阅)"
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204

  # 如果你有第二个订阅，可以取消下面这一整段注释，并搜索本文件中的「Subscription2」一起取消注释
  # 注意path字段不要重复了，path的意思是，这个订阅从远程拉下来，在你本地放置的位置以及文件名叫啥，文件名重复订阅会出问题
  # Subscription2:
  #   type: http
  #   url: "你的第二个订阅地址写在这里，订阅地址的 url 打开，必须得是纯 base64 字符串的那种"
  #   path: ./providers/Subscription2.yaml
  #   interval: 86400
  #   exclude-filter: "(?i)(?:\\d+(\\.\\d*)?\\s*GB|traffic|expire|premium|github|isp|流量|网址|套餐|应急|时间|重置|剩余|[到过]期|订阅)"
  #   health-check:
  #     enable: true
  #     url: http://cp.cloudflare.com/generate_204
  #     interval: 300
  #     timeout: 5000
  #     lazy: true
  #     expected-status: 204

proxy-groups:
  - name: ✈️ 节点选择
    type: select
    proxies:
      - 🌿 自动选择
      - 🇭🇰 香港自动
      - 🇹🇼 台湾自动
      - 🇸🇬 狮城自动
      - 🇯🇵 日本自动
      - 🇺🇸 美国自动
      - 🇪🇺 欧洲自动
      - DIRECT
    use:
      - Subscription1
      # - Subscription2

  - name: 🌿 自动选择
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)^(?:(?!(?:[2-9][0-9]*|1[0-9]+)[x×]).)*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇭🇰 香港自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(Hong ?Kong|港|\\b(?:HK[G]?|HKT|HKBN|HGC)(\\d+)?\\b))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇹🇼 台湾自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(Taiwan|台湾|新北|彰化|\\b(?:TW[N]?|CHT|HINET)(\\d+)?\\b))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇸🇬 狮城自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(Singapore|新加坡|狮城|\\bSG[P]?(\\d+)?\\b))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇺🇸 美国自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(United ?States|美[国國]|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|\\bUS[A]?(\\d+)?\\b|America))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 80
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇯🇵 日本自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|Japan|\\bJP[N]?(\\d+)?\\b))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 🇪🇺 欧洲自动
    type: url-test
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)(?=.*(德国|德意志|法兰克福|中德|Germany|\\bDE[U]?(\\d+)?\\b|英国|伦敦|United.*?Kingdom|Britain|London|England|\\b(?:UK|GB[R]?)(\\d+)?\\b|法国|巴黎|France|Paris|\\bFR[A]?\\b|(?<!白)俄罗斯|莫斯科|圣彼得堡|[新]?西伯[力利]亚|哈巴罗夫斯克|Russia|Moscow|Petersburg|Siberia|\\bRU[S]?(\\d+)?\\b|西班牙|Spain|España|\\bES[P]?\\b|荷兰|阿姆斯特丹|Netherlands|\\bNL[D]?(\\d+)?\\b|波兰|Poland|\\bP[O]?L\\b|丹麦|Denmark|\\bD[N]?K\\b|冰岛|Iceland|\\bIS[L]?\\b|意大利|米兰|Italy|italia|Milan|白俄罗斯|Belarus|黑山|Montenegro|梵蒂冈|Vatican ?City|安道尔|Andorra|马耳他|Malta|摩纳哥|Monaco|圣马力诺|San ?Marino|列支敦士登|Liechtenstein|阿尔巴尼亚|Albania|奥地利|维也纳|Austria|Vienna|波黑共和国|波士尼亚与赫塞哥维纳|Bosnia|Herzegovina|比利时|Belgium|保加利亚|Bulgaria|瑞士|苏黎世|Switzerland|Zurich|捷克|Czech|爱沙尼亚|Estonia|芬兰|赫尔辛基|Finland|Helsinki|希腊|Greece|克罗地亚|Croatia|匈牙利|Hungary|爱尔兰|都柏林|Ireland|Dublin|立陶宛|Lietuvos|卢森堡|Luxemburg|Luxembourg|拉脱维亚|Latvia|摩尔多瓦|Moldova|北马其顿|Macedonia|挪威|Norway|葡萄牙|Portugal|罗马尼亚|Romania|塞尔维亚|Serbia|瑞典|Sweden|斯洛文尼亚|Slovenia|斯洛伐克|Slovensko|乌克兰|Ukraine|直布罗陀|Gibraltar|法罗群岛|Faroe ?Islands|奥兰群岛|Åland ?Islands|马恩岛|Mann))^(?!.*(?:日用|实验性))(?:(?!.*\\d[\\.,]?\\d*[x×])|(?=.*(?<!\\d\\.)(?<![0-9])1(?:\\.0{1,2})?[x×])).*$"
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
    lazy: true
    expected-status: 204

  - name: 💬 AI专用
    type: select
    proxies:
      - 🇯🇵 日本自动
      - 🇸🇬 狮城自动
      - 🇺🇸 美国自动
      - 🇹🇼 台湾自动
      - 🇪🇺 欧洲自动
    use:
      - Subscription1
      # - Subscription2
    filter: "(?i)^((?!实验性|日用|San ?Jose|(?<!白)俄罗斯|莫斯科|圣彼得堡|[新]?西伯[力利]亚|哈巴罗夫斯克|Russia|Moscow|Petersburg|Siberia|\\bRU[S]?\\b|港|Hong ?Kong|\\b(?:HK[G]?|HKT|HKBN|HGC|WTT|CMI)\\b|澳门|Macao|\\bCTM\\b|朝鲜|North ?Korea|古巴|Cuba|伊朗|Iran|叙利亚|Syria|乌克兰|Ukraine|委内瑞拉|Venezuela).)*$"

  - name: 📲 TelegramDC1
    type: select
    proxies:
      - 🇺🇸 美国自动
      - 🇪🇺 欧洲自动
      - 🇸🇬 狮城自动
      - ✈️ 节点选择
      - 🇭🇰 香港自动
      - 🇹🇼 台湾自动
      - 🇯🇵 日本自动

  - name: 📲 TelegramDC2_4
